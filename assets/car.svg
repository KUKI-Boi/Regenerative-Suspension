<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="100%" height="100%">
    <defs>
        <!-- Gradients -->
        <linearGradient id="carBody" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ffb347" />
            <stop offset="100%" stop-color="#ff8c00" />
        </linearGradient>
        <linearGradient id="windowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#def3f6" />
            <stop offset="100%" stop-color="#b0e0e6" />
        </linearGradient>
        
        <!-- Mask for wheel arches -->
        <mask id="wheelMask">
            <rect width="400" height="120" fill="white" />
            <!-- Rear wheel hole (Left) -->
            <circle cx="90" cy="95" r="32" fill="black" />
            <!-- Front wheel hole (Right) -->
            <circle cx="310" cy="95" r="32" fill="black" />
        </mask>

        <filter id="carShadow" x="-10%" y="-10%" width="120%" height="120%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" />
            <feOffset dx="0" dy="1" result="offsetblur" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.3" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Main Chassis & Body - Flipped to face RIGHT -->
    <g mask="url(#wheelMask)" filter="url(#carShadow)">
        <!-- Lower Body / Bumper -->
        <path d="M 360 95 L 40 95 L 20 85 L 20 70 L 30 65 L 370 65 L 380 75 L 380 90 Z" fill="#ff7f00" />
        
        <!-- Upper Body / Cabin -->
        <path d="M 370 70 
                 L 375 55 
                 C 375 55, 365 45, 300 35 
                 L 270 25 
                 L 70 25 
                 C 50 25, 40 35, 35 45 
                 L 25 60 
                 L 15 75 
                 L 20 95 
                 L 370 95 Z" fill="url(#carBody)" stroke="#cc7000" stroke-width="1.5" />

        <!-- Door Lines -->
        <path d="M 270 25 L 270 95" stroke="#cc7000" stroke-width="1" opacity="0.4" />
        <path d="M 170 25 L 170 95" stroke="#cc7000" stroke-width="1" opacity="0.4" />
        <path d="M 170 55 L 270 55" stroke="#cc7000" stroke-width="1" opacity="0.4" />
        <circle cx="260" cy="50" r="3" fill="#cc7000" opacity="0.4" />
        <circle cx="160" cy="50" r="3" fill="#cc7000" opacity="0.4" />
    </g>

    <!-- Windows (Flipped) -->
    <path d="M 265 30 L 175 30 L 175 50 L 265 50 Z" fill="url(#windowGrad)" stroke="#888" stroke-width="0.5" />
    <path d="M 165 30 L 80 30 C 65 30, 55 40, 50 50 L 50 50 L 165 50 Z" fill="url(#windowGrad)" stroke="#888" stroke-width="0.5" />
    <path d="M 275 32 L 340 50 L 275 50 Z" fill="url(#windowGrad)" stroke="#888" stroke-width="0.5" />

    <!-- Driver Silhouette (Facing RIGHT) -->
    <g opacity="0.6">
        <circle cx="235" cy="40" r="8" fill="#8d5524" /> <!-- Head -->
        <path d="M 235 48 C 240 55, 260 65, 265 70" stroke="#c0392b" stroke-width="6" stroke-linecap="round" fill="none" /> <!-- Body/Arm -->
    </g>

    <!-- Lights (Flipped) -->
    <path d="M 375 60 L 355 55 L 355 65 Z" fill="#ffeb3b" opacity="0.7" /> <!-- Front Headlight (Now Right) -->
    <path d="M 25 55 C 15 55, 15 75, 25 75 Z" fill="#f44336" /> <!-- Tail Light (Now Left) -->

    <!-- Side Mirror -->
    <path d="M 275 50 L 285 48 L 285 52 Z" fill="#ff8c00" stroke="#333" stroke-width="0.5" />

</svg>
